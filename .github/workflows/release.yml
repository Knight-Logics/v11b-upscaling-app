name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build executable
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}"
          if ([string]::IsNullOrWhiteSpace($ver) -or $ver -eq "main") { $ver = "manual" }
          ./build_release.ps1 -Version $ver

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/v11b-upscaling-app.exe
            release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
